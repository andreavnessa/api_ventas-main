<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sistema de Ventas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex">
        <nav class="bg-dark text-white p-3" style="width: 250px; min-height: 100vh;">
            <div class="mb-3">
                <small>Hola, <span id="userName"></span></small>
                <button onclick="logout()" class="btn btn-sm btn-outline-light ms-2">Cerrar Sesión</button>
            </div>
            <h5>Dashboard</h5>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link text-white" href="#">Inicio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="#">Clientes</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="#">Productos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="#">Ventas</a>
                </li>
                <li class="nav-item" id="gestionUsuarios" style="display: none;">
                    <a class="nav-link text-white" href="/users/">Gestión de Usuarios</a>
                </li>
            </ul>
        </nav>
        <div class="flex-grow-1 p-3">
            <h1>Bienvenido al Sistema de Ventas</h1>
            <p>Selecciona una opción del menú lateral.</p>
        </div>
    </div>
    <script>
        window.onload = function() {
            const token = localStorage.getItem('token');
            const rol = localStorage.getItem('rol');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }            document.getElementById('userName').textContent = localStorage.getItem('username') || 'Usuario';            if (rol === 'admin') {
                document.getElementById('gestionUsuarios').style.display = 'block';
            }
        };

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('refresh');
            localStorage.removeItem('rol');
            localStorage.removeItem('username');
            window.location.href = '/login/';
        }
    </script>
</body>
</html>
