<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios - Sistema de Ventas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>Gestión de Usuarios</h1>
        <a href="/registro/" class="btn btn-primary mb-3">Registrar Nuevo Usuario</a>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Usuario</th>
                    <th>Email</th>
                    <th>Rol</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="usersTable">
                <!-- Usuarios se cargarán aquí -->
            </tbody>
        </table>
        <a href="/dashboard/" class="btn btn-secondary">Volver al Dashboard</a>
    </div>
    <script>
        window.onload = function() {
            const token = localStorage.getItem('token');
            const rol = localStorage.getItem('rol');
            if (!token || rol !== 'admin') {
                window.location.href = '/login/';
                return;
            }
            loadUsers();
        };

        async function loadUsers() {
            const token = localStorage.getItem('token');
            try {
                const response = await fetch('/api/admin/users/', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    const users = await response.json();
                    const table = document.getElementById('usersTable');
                    table.innerHTML = '';
                    users.forEach(user => {
                        const rol = user.groups && user.groups.length > 0 ? user.groups[0] : 'Sin rol';
                        const row = `
                            <tr>
                                <td>${user.id}</td>
                                <td>${user.username}</td>
                                <td>${user.email}</td>
                                <td>${rol}</td>
                                <td>
                                    <button class="btn btn-warning btn-sm" onclick="resetPassword(${user.id})">Resetear Contraseña</button>
                                </td>
                            </tr>
                        `;
                        table.innerHTML += row;
                    });
                } else {
                    alert('Error al cargar usuarios.');
                }
            } catch (error) {
                alert('Error de conexión.');
            }
        }

        async function resetPassword(userId) {
            const token = localStorage.getItem('token');
            try {
                const response = await fetch(`/api/admin/users/${userId}/reset_password/`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    const data = await response.json();
                    alert(`Contraseña reseteada. Nueva contraseña: ${data.new_password}`);
                } else {
                    alert('Error al resetear contraseña.');
                }
            } catch (error) {
                alert('Error de conexión.');
            }
        }
    </script>
</body>
</html>
