<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistema de Ventas{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(180deg, #f4f7fb 0%, #eef3f8 100%);
            color: #1f2937;
        }

        .navbar {
            background: linear-gradient(135deg, #1d466f 0%, #163a5d 100%) !important;
            box-shadow: 0 10px 30px rgba(29, 70, 111, 0.18);
        }

        .navbar-brand {
            font-weight: 700;
            letter-spacing: 0.3px;
            color: #ffffff !important;
        }

        .navbar-text {
            color: rgba(255, 255, 255, 0.9) !important;
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.9) !important;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .nav-link:hover {
            opacity: 1;
            transform: translateY(-1px);
            color: #ffffff !important;
        }

        .page-shell {
            padding-top: 2rem;
            padding-bottom: 2rem;
        }

        .content-card {
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(226, 232, 240, 0.9);
            border-radius: 1rem;
            box-shadow: 0 20px 45px rgba(15, 23, 42, 0.08);
            padding: 1.5rem;
        }

        .table {
            margin-bottom: 0;
        }

        .table thead th {
            border-bottom: none;
            background: #eff6ff;
            color: #1d4ed8;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.78rem;
            letter-spacing: 0.04em;
        }

        .table tbody tr {
            vertical-align: middle;
        }

        .btn {
            border-radius: 0.75rem;
        }

        .btn-primary {
            background: linear-gradient(90deg, #2563eb 0%, #1d4ed8 100%);
            border: none;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
        }

        .btn-primary:hover {
            background: linear-gradient(90deg, #1d4ed8 0%, #1e40af 100%);
        }

        .page-title {
            font-weight: 700;
            margin-bottom: 1.25rem;
            color: #0f172a;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.25rem;
            flex-wrap: wrap;
        }

        .table-responsive {
            border-radius: 0.9rem;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            {% if user.is_authenticated %}
                <a class="navbar-brand" href="{% url 'home' %}">Dr. Antojos</a>
                <div class="navbar-nav">
                    <a class="nav-link" href="{% url 'cliente_list' %}">Clientes</a>
                    <a class="nav-link" href="{% url 'producto_list' %}">Productos</a>
                    <a class="nav-link" href="{% url 'venta_list' %}">Ventas</a>
                    <a class="nav-link" href="{% url 'reporte_quincenal' %}">Reporte quincenal</a>
                    {% if user.is_staff or user.is_superuser %}
                        <a class="nav-link" href="{% url 'admin:index' %}">Admin</a>
                    {% endif %}
                </div>
                <div class="navbar-nav ms-auto align-items-lg-center">
                    <span class="navbar-text me-2">Hola, {{ user.username }}</span>
                    <form method="post" action="{% url 'logout' %}" class="d-inline">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-link nav-link p-0 border-0">Cerrar Sesión</button>
                    </form>
                </div>
            {% else %}
                <span class="navbar-brand mb-0 h1">Dr. Antojos</span>
            {% endif %}
        </div>
    </nav>

    <div class="container page-shell">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
