{% extends 'ventas/base.html' %}

{% block title %}{% if object %}Editar{% else %}Crear{% endif %} Cliente{% endblock %}

{% block content %}
<h2>{% if object %}Editar{% else %}Crear{% endif %} Cliente</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Guardar</button>
    <a href="{% url 'cliente_list' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
