{% extends 'ventas/base.html' %}

{% block title %}Sesión cerrada{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-lg-5 col-md-7">
        <div class="card shadow-lg border-0">
            <div class="card-body p-4 text-center">
                <h2>Has cerrado sesión</h2>
                <p class="text-muted">Gracias por usar el sistema de ventas. Tu sesión se ha cerrado correctamente.</p>
                <a href="{% url 'login' %}" class="btn btn-primary">Volver a iniciar sesión</a>
                <a href="{% url 'home' %}" class="btn btn-secondary ms-2">Ir a la página principal</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
